<!DOCTYPE html>
<html lang="en" x-data="storeApp()">

<head>
  
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
    <title>AOS Practice</title>
  
    <link rel="stylesheet" href="styles.css" />
    <!-- AOS Initialization -->
    <link rel="stylesheet" href="aos/aos.css" />
    <!-- Initialization end -->

  </head>
  <body>

      <div class="simbox" data-aos="fade-up" >1</div>
      <div class="simbox" data-aos="flip-right" >2</div>
      <div class="simbox" data-aos="fade-left" >3</div>
      <div class="simbox" data-aos="fade-right" >4</div>
      <div class="simbox" data-aos="fade-in" >5</div>
      <div class="simbox" data-aos="zoom-in" >6</div>
      <div class="simbox" data-aos="zoom-in-left" >7</div>


        <!-- AOS Install -->
        <script src="aos/aos.js"></script>
        <script>
            $(document).ready(function(){
            AOS.init({
              duration: 1000
            });
  
        </script>
        
      <script src="jquery.min.js"></script>
        <!-- Install end -->
      <script src="script.js"></script>

  </body>
</html>
